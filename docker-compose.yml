services:
  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playerdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    image: shrunkhood/mini-full-stack-demo:latest
    container_name: spring-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/playerdb
      DB_USER: root
      DB_PASS: root

volumes:
  mysql_data:
